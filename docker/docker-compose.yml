services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: crm
      POSTGRES_USER: crm
      POSTGRES_PASSWORD: crmsecret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crm -d crm"]
      interval: 5s
      timeout: 5s
      retries: 12

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    environment:
      # Conexión DB: por defecto usa Postgres local del compose.
      # Para Supabase, define estas variables en un archivo .env en esta carpeta (docker/).
      DATABASE_URL: ${DATABASE_URL:-jdbc:postgresql://postgres:5432/crm}
      DATABASE_USER: ${DATABASE_USER:-crm}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-crmsecret}
      JWT_SECRET: docker-dev-use-openssl-rand-hex-32-for-real-deployments-min-32-chars
      CORS_ORIGINS: http://localhost:8081
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    ports:
      - "8081:80"
    depends_on:
      - backend

volumes:
  pgdata:
