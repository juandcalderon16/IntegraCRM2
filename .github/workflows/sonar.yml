# Análisis SonarCloud del backend (Java + JaCoCo).
# Secrets requeridos en GitHub → Settings → Secrets:
#   SONAR_TOKEN  → token de SonarCloud
#   SONAR_HOST_URL → https://sonarcloud.io (opcional si usas SonarCloud)

name: SonarCloud

on:
  push:
    branches: [main, master]
    paths:
      - 'backend/**'
      - '.github/workflows/sonar.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'backend/**'

jobs:
  sonar:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run tests + JaCoCo
        run: mvn -B clean test

      - name: SonarCloud Scan
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: >
          mvn -B org.sonarsource.scanner.maven:sonar-maven-plugin:sonar
          -Dsonar.projectKey=TU_ORG_TU_PROYECTO
          -Dsonar.organization=TU_ORG_EN_SONARCLOUD
          -Dsonar.host.url=${{ secrets.SONAR_HOST_URL || 'https://sonarcloud.io' }}
          -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml
